<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>What We Watch</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      width: 280px;
      background: #111;
      color: #e8e8e8;
    }

    /* ── Screen 1 ── */
    #screen-main { padding: 16px; }
    #screen-main h2 { font-size: 15px; font-weight: 600; margin-bottom: 12px; color: #fff; }

    #sendBtn {
      width: 100%; padding: 10px;
      background: #2563eb; color: #fff;
      border: none; border-radius: 8px;
      font-size: 14px; font-weight: 500; cursor: pointer;
    }
    #sendBtn:hover { background: #1d4ed8; }
    #sendBtn:disabled { background: #1e3a6e; color: #7ba3e0; cursor: default; }
    #main-status { font-size: 12px; color: #888; margin-top: 8px; min-height: 16px; }

    /* ── Screen 2 ── */
    #screen-edit { display: none; padding: 14px; }
    #edit-error {
      font-size: 12px; color: #f87171;
      margin-bottom: 10px; min-height: 16px;
    }
    .field-label {
      font-size: 11px; color: #666;
      text-transform: uppercase; letter-spacing: 0.05em;
      margin-bottom: 4px;
    }
    .field-row { margin-bottom: 10px; }
    input[type=text] {
      width: 100%; padding: 8px 10px;
      background: #1c1c1c; border: 1px solid #333;
      border-radius: 6px; color: #fff; font-size: 13px; outline: none;
    }
    input[type=text]:focus { border-color: #2563eb; }
    #yearInput { width: 90px; }
    .edit-actions { display: flex; gap: 8px; margin-top: 4px; }
    #backBtn {
      flex: 1; padding: 9px;
      background: #1c1c1c; color: #aaa;
      border: 1px solid #333; border-radius: 8px;
      font-size: 13px; cursor: pointer;
    }
    #backBtn:hover { background: #252525; color: #fff; }
    #retryBtn {
      flex: 2; padding: 9px;
      background: #2563eb; color: #fff;
      border: none; border-radius: 8px;
      font-size: 13px; font-weight: 500; cursor: pointer;
    }
    #retryBtn:hover { background: #1d4ed8; }
    #retryBtn:disabled { background: #1e3a6e; color: #7ba3e0; cursor: default; }
    #edit-status { font-size: 12px; margin-top: 8px; min-height: 16px; }

    /* shared */
    .ok  { color: #4ade80; }
    .err { color: #f87171; }
  </style>
</head>
<body>

  <div id="screen-main">
    <h2>🍿 What We Watch</h2>
    <button id="sendBtn">Send to Telegram</button>
    <div id="main-status"></div>
  </div>

  <div id="screen-edit">
    <div id="edit-error"></div>
    <div class="field-row">
      <div class="field-label">Movie title</div>
      <input type="text" id="titleInput" placeholder="e.g. Sinners" />
    </div>
    <div class="field-row">
      <div class="field-label">Year</div>
      <input type="text" id="yearInput" placeholder="e.g. 2025" maxlength="4" />
    </div>
    <div class="edit-actions">
      <button id="backBtn">← Back</button>
      <button id="retryBtn">Search & Send 🔍</button>
    </div>
    <div id="edit-status"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
