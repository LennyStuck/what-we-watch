<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>What We Watch</title>
  <style>
    body { font-family: sans-serif; width: 260px; padding: 16px; }
    h2 { font-size: 16px; margin-bottom: 8px; }
    #status { font-size: 13px; color: #555; margin-top: 8px; }
    button {
      width: 100%;
      padding: 10px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
    }
    button:hover { background: #1d4ed8; }
    button:disabled { background: #93c5fd; cursor: default; }
  </style>
</head>
<body>
  <h2>🍿 What We Watch</h2>
  <button id="sendBtn">Send to Telegram</button>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
